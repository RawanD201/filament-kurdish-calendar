name: Bug report
description: Report a reproducible bug.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps to reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: "8.2.x–8.5.x"
    validations:
      required: true

  - type: input
    id: laravel
    attributes:
      label: Laravel version
      placeholder: "12.x"
    validations:
      required: true

  - type: input
    id: filament
    attributes:
      label: Filament version
      placeholder: "5.x"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or screenshots (remove sensitive data).
    validations:
      required: false

